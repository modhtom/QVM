<div id="partForm" class="page">
  <button class="back-btn" onclick="showPage('partOptions')"><span>←</span> رجوع</button>
  <div class="container">
    <div class="header">
      <h1 class="logo">آيات (مكتبة)</h1>
    </div>
    <div class="form-container">
      <div class="form-grid">
        <div class="form-section">
          <h3>(اختياري) إعدادات الفيديو</h3>
          <div class="form-group"><label for="fontColorPart">لون النص</label><input type="color" id="fontColorPart"
              value="#ffffff"></div>
          <div class="form-group"><label for="fontSizePart">حجم الخط</label><input type="range" id="fontSizePart"
              min="1" max="72" value="10"><span id="fontSizeValuePart">10px</span></div>
          <div class="form-group"><label for="fontNamePart">الخط</label><select id="fontNamePart" class="form-control">
              <option value="Tasees Regular">Tasees</option>
              <option value="DecoType Thuluth II">DTHULUTH II</option>
            </select></div>
          <div class="form-group"><label for="subtitlePositionPart">موقع النص</label><select id="subtitlePositionPart"
              class="form-control">
              <option value="bottom">أسفل</option>
              <option value="middle">وسط</option>
            </select></div>
          <div class="checkbox-group"><input type="checkbox" id="showMetadataPart"><label for="showMetadataPart">عرض
              معلومات السورة والقارئ</label></div>
          <div class="form-group"><label for="resolutionPart">دقة الفيديو (Resolution)</label><select
              id="resolutionPart" class="form-control">
              <option value="720p">720p (سريع - HD)</option>
              <option value="480p">480p (فائق السرعة - SD)</option>
              <option value="1080p">1080p (بطيء - FHD)</option>
            </select></div>
          <div class="form-group"><label for="translationEditionPart">الترجمة</label><select id="translationEditionPart"
              class="form-control">
              <option value="">بدون</option>
              <option value="en.sahih">English - Sahih</option>
              <option value="es.cortes">Español - Cortes</option>
            </select></div>
          <div class="form-group"><label for="pexelsVideoPart">خلفية من موقع unsplash</label><input type="text"
              id="pexelsVideoPart" placeholder="أدخل كلمة مفتاحية"></div>
          <div class="form-group"><label for="imageLinkPart">خلفية صورة</label><input type="text" id="imageLinkPart"
              placeholder="أدخل رابط الصورة"></div>
          <div class="form-group"><label for="youtubeLinkPart">خلفية YouTube</label><input type="text"
              id="youtubeLinkPart" placeholder="أدخل رابط YouTube"></div>
          <div class="form-group"><label for="backgroundUploadPart">رفع خلفية</label><input type="file"
              id="backgroundUploadPart" class="form-control" accept="video/*,image/*"></div>
        </div>
        <div class="form-section">
          <h3>إعدادات القرآن</h3>
          <div class="form-group"><label>الرواية</label><select id="partMushaf" class="form-control"></select></div>
          <div class="form-group"><label for="edition">القارئ</label><select id="edition" class="form-control"></select>
          </div>
          <div class="form-group"><label for="surahNumber">السورة</label><select id="surahNumber"
              class="form-control"></select></div>
          <div class="arabic-input">
            <div class="arabic-label">آية البداية</div><input type="number" min="1" id="startVerse"
              placeholder="رقم آية البداية">
          </div>
          <div class="arabic-input">
            <div class="arabic-label">آية النهاية</div><input type="number" min="1" id="endVerse"
              placeholder="رقم آية النهاية">
          </div>
          <div class="checkbox-group"><input type="checkbox" id="verticalVideoPart"><label for="verticalVideoPart">فيديو
              طولي للريلز (9:16) <i class="fas fa-info-circle tooltip-icon"
                style="color:#8b949e; cursor:pointer; margin-right:5px;"
                onclick="window.showTooltip(this, 'verticalVideo')"></i></label></div>
          <button class="action-btn create-btn">إنشاء الفيديو</button>
        </div>
      </div>
    </div>
  </div>
</div>
