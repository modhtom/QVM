<div id="shareModal" class="share-modal-overlay" style="display:none;">
    <div class="share-modal">
      <div class="share-header">
        <h3><i class="fas fa-share-alt" style="margin-left:8px;"></i>مشاركة الفيديو</h3>
        <button class="close-share" onclick="closeShareModal()">×</button>
      </div>
      <div class="share-platforms">
        <button class="share-option" id="shareWhatsApp" onclick="shareTo('whatsapp')">
          <i class="fab fa-whatsapp" style="color:#25d366;"></i>
          <span>واتساب</span>
        </button>
        <button class="share-option" id="shareTelegram" onclick="shareTo('telegram')">
          <i class="fab fa-telegram" style="color:#0088cc;"></i>
          <span>تلغرام</span>
        </button>
        <button class="share-option" id="shareTwitter" onclick="shareTo('twitter')">
          <i class="fab fa-x-twitter" style="color:#000;"></i>
          <span>X / تويتر</span>
        </button>
        <button class="share-option" id="shareFacebook" onclick="shareTo('facebook')">
          <i class="fab fa-facebook" style="color:#1877f2;"></i>
          <span>فيسبوك</span>
        </button>
        <button class="share-option" id="shareCopyLink" onclick="shareTo('copy')">
          <i class="fas fa-link" style="color:var(--primary-color);"></i>
          <span>نسخ الرابط</span>
        </button>
        <button class="share-option" id="shareNative" onclick="shareTo('native')" style="display:none;">
          <i class="fas fa-share" style="color:var(--accent-color);"></i>
          <span>مشاركة أخرى</span>
        </button>
      </div>
    </div>
  </div>
