<div id="feedbackPage" class="page">
    <button class="back-btn" onclick="goBack()"><span>←</span> رجوع</button>
    <div class="container">
      <div class="header">
        <h1 class="logo">آراء ومقترحات</h1>
        <p class="subtitle">يسعدنا سماع رأيك لتحسين QVM</p>
      </div>
      <div class="form-container">
        <form id="feedbackForm">
          <div class="form-group">
            <label for="feedbackType">نوع الرسالة</label>
            <select id="feedbackType" class="form-control" required="">
              <option value="improvement">اقتراح تحسين</option>
              <option value="bug">إبلاغ عن مشكلة</option>
              <option value="feedback">رأي عام</option>
              <option value="other">أخرى</option>
            </select>
          </div>
          <div class="form-group">
            <label for="feedbackContent">رسالتك</label>
            <textarea id="feedbackContent" class="form-control" rows="6" placeholder="اكتب أفكارك هنا..." required=""></textarea>
          </div>
          <button type="submit" class="action-btn create-btn" style="width: 100%;">
            <i class="fas fa-paper-plane"></i> إرسال
          </button>
        </form>
      </div>
    </div>
  </div>
